<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI编程入门伴学营 V3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #070b16 0%, #0f1a33 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #eaf1ff;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    h1 {
      font-size: clamp(24px, 5vw, 36px);
      margin-bottom: 20px;
      background: linear-gradient(135deg, #5dd6ff, #8bffbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #9fb0d0;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #5dd6ff, #8bffbf);
      color: #06101d;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(93, 214, 255, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(93, 214, 255, 0.5);
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(93, 214, 255, 0.3);
      border-top-color: #5dd6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .notice {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid rgba(255, 191, 105, 0.3);
      border-radius: 8px;
      background: rgba(255, 214, 107, 0.07);
      color: #ffe8ae;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 AI编程入门伴学营 V3</h1>
    <p>正在为您加载学习平台，请稍候...</p>
    <a href="AI编程入门教程V3.html" class="btn" id="enterBtn">
      <span class="loading" id="loading"></span>
      进入训练营
    </a>
    <div class="notice" id="notice" style="display:none;">
      ⏳ 如果没有自动跳转，请点击上方按钮手动进入
    </div>
  </div>

  <script>
    // 自动跳转到主程序
    setTimeout(function() {
      window.location.replace('AI编程入门教程V3.html');
    }, 1500);

    // 显示备用提示
    setTimeout(function() {
      document.getElementById('notice').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }, 2000);
  </script>
</body>
</html>
